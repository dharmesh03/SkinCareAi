{% extends "base.html" %}
{% block title %}Reset Password – Skincare AI{% endblock %}
{% block extra_css %}
<style>
.auth-wrapper { min-height:calc(100vh - 180px); display:flex; align-items:center; justify-content:center; padding:20px 0; }
.auth-container { width:100%; max-width:440px; }
.auth-card { background:white; border-radius:var(--r-lg); box-shadow:var(--shadow-lg); overflow:hidden; border:1px solid var(--border); animation:slideUp 0.5s ease; }
.auth-header { background:var(--navy); padding:36px 40px 28px; position:relative; overflow:hidden; }
.auth-header::before { content:''; position:absolute; inset:0; background:var(--gradient-mesh); }
.auth-header-icon { width:52px; height:52px; background:rgba(16,185,129,0.20); border:2px solid rgba(16,185,129,0.30); border-radius:14px; display:flex; align-items:center; justify-content:center; color:#6EE7B7; font-size:1.3rem; margin-bottom:14px; position:relative; z-index:1; }
.auth-header h2 { font-family:'DM Serif Display',serif; font-size:1.7rem; color:white; margin-bottom:6px; position:relative; z-index:1; }
.auth-header p { color:rgba(255,255,255,0.55); font-size:0.875rem; position:relative; z-index:1; }
.auth-body { padding:32px 40px; }
.input-group { position:relative; }
.input-group .input-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:0.875rem; }
.input-group .form-control { padding-left:40px; }
.input-group .toggle-password { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--text-muted); cursor:pointer; padding:4px; }
.btn-submit { width:100%; padding:13px; background:linear-gradient(135deg,#10B981,#059669); color:white; border:none; border-radius:var(--r-sm); font-size:0.95rem; font-weight:600; cursor:pointer; transition:all 0.25s; font-family:'Outfit',sans-serif; display:flex; align-items:center; justify-content:center; gap:8px; box-shadow:0 6px 20px rgba(16,185,129,0.30); }
.btn-submit:hover { transform:translateY(-2px); }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-header-icon">
                    <i class="fas fa-shield-check"></i>
                </div>
                <h2>Reset Password</h2>
                <p>Enter your new password below</p>
            </div>
            <div class="auth-body">
                <form method="POST">
                    <div class="form-group">
                        <label class="form-label">New Password</label>
                        <div class="input-group">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" name="password" id="password" class="form-control"
                                   placeholder="Minimum 6 characters" required minlength="6">
                            <button type="button" class="toggle-password" onclick="togglePwd()">
                                <i class="fas fa-eye" id="eyeIcon"></i>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn-submit">
                        <i class="fas fa-circle-check"></i> Update Password
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
function togglePwd() {
    const pwd = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    if (pwd.type === 'password') { pwd.type = 'text'; icon.classList.replace('fa-eye','fa-eye-slash'); }
    else { pwd.type = 'password'; icon.classList.replace('fa-eye-slash','fa-eye'); }
}
</script>
{% endblock %}
